<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${livro.id == null ? 'Novo Livro' : 'Editar Livro'} + ' – OpenChapter'">Livro – OpenChapter</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --cream: #f5f5f3;
            --ink: #1c1c1c;
            --teal: #00696b;
            --teal-dark: #005456;
            --teal-light: #0a8587;
            --teal-pale: #e0f0f0;
            --warm-gray: #8a8478;
            --border: #ddd8d0;
            --error: #b85c4a;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            color: var(--ink);
            min-height: 100vh;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 56px;
            border-bottom: 1px solid var(--border);
            background: var(--cream);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .nav-brand {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--teal);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-links a {
            font-size: 13px;
            color: var(--warm-gray);
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--teal);
            font-weight: 500;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-user {
            font-size: 13px;
            color: var(--warm-gray);
        }

        .nav-user span {
            font-weight: 500;
            color: var(--ink);
        }

        .btn-logout {
            padding: 7px 18px;
            background: transparent;
            border: 1.5px solid var(--border);
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            color: var(--warm-gray);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-logout:hover {
            border-color: var(--teal);
            color: var(--teal);
        }

        .page {
            max-width: 680px;
            margin: 0 auto;
            padding: 48px 24px 80px;
            animation: fadeUp 0.6s ease both;
        }

        .breadcrumb {
            font-size: 12.5px;
            color: var(--warm-gray);
            margin-bottom: 24px;
        }

        .breadcrumb a {
            color: var(--teal);
            text-decoration: none;
        }

        .breadcrumb a:hover {
            text-decoration: underline;
        }

        .page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            font-weight: 300;
            margin-bottom: 8px;
        }

        .page-title em {
            font-style: italic;
            color: var(--teal);
        }

        .page-subtitle {
            font-size: 13px;
            color: var(--warm-gray);
            margin-bottom: 36px;
        }

        .alert-error {
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 24px;
            background: #fdf0ee;
            color: var(--error);
            border-left: 3px solid var(--error);
        }

        .card {
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            padding: 32px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-grid .full {
            grid-column: 1 / -1;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 11.5px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--warm-gray);
        }

        .field input,
        .field select {
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            background: var(--cream);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--ink);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .field input:focus,
        .field select:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(0, 105, 107, 0.1);
            background: #fff;
        }

        .field input::placeholder {
            color: #c5bfb6;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn-primary {
            padding: 13px 28px;
            background: var(--teal);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-primary:hover {
            background: var(--teal-light);
            transform: translateY(-1px);
        }

        .btn-secondary {
            padding: 13px 24px;
            background: transparent;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--warm-gray);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            border-color: var(--teal);
            color: var(--teal);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            nav {
                padding: 20px 24px;
            }
        }
    </style>
</head>

<body>

    <nav>
        <a class="nav-brand" href="/home">OpenChapter</a>
        <div class="nav-links">
            <a href="/home">Home</a>
            <a href="/livros" class="active">Livros</a>
            <a href="/emprestimos">Empréstimos</a>
            <a href="/reservas">Reservas</a>
        </div>
        <div class="nav-right">
            <div class="nav-user">Olá, <span sec:authentication="name">usuário</span></div>
            <form method="post" action="/logout" style="margin:0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn-logout">Sair</button>
            </form>
        </div>
    </nav>

    <div class="page">

        <div class="breadcrumb">
            <a href="/livros">← Voltar para Livros</a>
        </div>

        <h1 class="page-title" th:text="${livro.id == null ? 'Novo' : 'Editar'} + ' <em>Livro</em>'">
            Novo <em>Livro</em>
        </h1>
        <p class="page-subtitle"
            th:text="${livro.id == null ? 'Preencha os dados para adicionar ao catálogo.' : 'Atualize as informações do livro.'}">
        </p>

        <div th:if="${erro}" class="alert-error" th:text="${erro}"></div>

        <div class="card">
            <form th:action="@{/livros/salvar}" method="post" th:object="${livro}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" th:field="*{id}" />

                <div class="form-grid">
                    <div class="field full">
                        <label>Título</label>
                        <input type="text" th:field="*{titulo}" placeholder="Título do livro" required />
                    </div>
                    <div class="field full">
                        <label>Autor</label>
                        <input type="text" th:field="*{autor}" placeholder="Nome do autor" required />
                    </div>
                    <div class="field">
                        <label>ISBN</label>
                        <input type="text" th:field="*{isbn}" placeholder="978-0-000-00000-0" />
                    </div>
                    <div class="field">
                        <label>Ano de Publicação</label>
                        <input type="number" th:field="*{anoPublicacao}" placeholder="2024" min="1000" max="2099" />
                    </div>
                    <div class="field">
                        <label>Categoria</label>
                        <select th:field="*{categoria}">
                            <option value="">Selecione...</option>
                            <option value="Romance">Romance</option>
                            <option value="Ficção Científica">Ficção Científica</option>
                            <option value="Fantasia">Fantasia</option>
                            <option value="Terror">Terror</option>
                            <option value="Suspense">Suspense</option>
                            <option value="Biografia">Biografia</option>
                            <option value="História">História</option>
                            <option value="Filosofia">Filosofia</option>
                            <option value="Tecnologia">Tecnologia</option>
                            <option value="Autoajuda">Autoajuda</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Quantidade Total</label>
                        <input type="number" th:field="*{quantidadeTotal}" placeholder="Ex: 5" min="1" required />
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary"
                        th:text="${livro.id == null ? 'Cadastrar Livro' : 'Salvar Alterações'}">
                        Cadastrar Livro
                    </button>
                    <a href="/livros" class="btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>

    </div>
</body>

</html>
